<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>
  <!-- Road -->
  <ellipse cx="64" cy="72" rx="50" ry="30" fill="#333" stroke="#555" stroke-width="2"/>
  <ellipse cx="64" cy="72" rx="32" ry="16" fill="#1a1a2e"/>
  <!-- Car body -->
  <rect x="44" y="52" width="40" height="22" rx="6" fill="#e84d1c"/>
  <rect x="50" y="44" width="28" height="14" rx="4" fill="#cc3a0e"/>
  <!-- Wheels -->
  <circle cx="52" cy="74" r="7" fill="#222"/>
  <circle cx="52" cy="74" r="3" fill="#888"/>
  <circle cx="76" cy="74" r="7" fill="#222"/>
  <circle cx="76" cy="74" r="3" fill="#888"/>
  <!-- Windshield -->
  <rect x="53" y="46" width="22" height="10" rx="2" fill="#7ecfff" opacity="0.8"/>
  <!-- Question mark -->
  <text x="64" y="32" font-family="sans-serif" font-size="22" font-weight="bold"
        fill="#f4a261" text-anchor="middle">?</text>
  <!-- Coin -->
  <circle cx="96" cy="32" r="10" fill="#f4a261"/>
  <text x="96" y="37" font-family="sans-serif" font-size="12" font-weight="bold"
        fill="#1a1a2e" text-anchor="middle">$</text>
</svg>
