<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0615"/>
      <stop offset="100%" stop-color="#1a0606"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Speed lines left -->
  <g opacity="0.08" stroke="#FF4444" stroke-width="2">
    <line x1="0" y1="80" x2="380" y2="720"/>
    <line x1="80" y1="80" x2="460" y2="720"/>
    <line x1="160" y1="80" x2="540" y2="720"/>
    <line x1="240" y1="80" x2="620" y2="720"/>
  </g>
  <!-- Speed lines right -->
  <g opacity="0.08" stroke="#FF4444" stroke-width="2">
    <line x1="1280" y1="80" x2="900" y2="720"/>
    <line x1="1200" y1="80" x2="820" y2="720"/>
    <line x1="1120" y1="80" x2="740" y2="720"/>
    <line x1="1040" y1="80" x2="660" y2="720"/>
  </g>

  <!-- Top red stripe -->
  <rect x="0" y="0" width="1280" height="12" fill="#CC1111"/>
  <!-- Bottom yellow stripe -->
  <rect x="0" y="708" width="1280" height="12" fill="#FFD700"/>

  <!-- Checkered flag strip top-left -->
  <g transform="translate(30, 30)" opacity="0.6">
    <rect x="0"  y="0"  width="20" height="20" fill="#fff"/>
    <rect x="20" y="0"  width="20" height="20" fill="#000"/>
    <rect x="40" y="0"  width="20" height="20" fill="#fff"/>
    <rect x="60" y="0"  width="20" height="20" fill="#000"/>
    <rect x="80" y="0"  width="20" height="20" fill="#fff"/>
    <rect x="0"  y="20" width="20" height="20" fill="#000"/>
    <rect x="20" y="20" width="20" height="20" fill="#fff"/>
    <rect x="40" y="20" width="20" height="20" fill="#000"/>
    <rect x="60" y="20" width="20" height="20" fill="#fff"/>
    <rect x="80" y="20" width="20" height="20" fill="#000"/>
    <rect x="0"  y="40" width="20" height="20" fill="#fff"/>
    <rect x="20" y="40" width="20" height="20" fill="#000"/>
    <rect x="40" y="40" width="20" height="20" fill="#fff"/>
    <rect x="60" y="40" width="20" height="20" fill="#000"/>
    <rect x="80" y="40" width="20" height="20" fill="#fff"/>
  </g>
  <!-- Checkered flag strip top-right -->
  <g transform="translate(1170, 30)" opacity="0.6">
    <rect x="0"  y="0"  width="20" height="20" fill="#000"/>
    <rect x="20" y="0"  width="20" height="20" fill="#fff"/>
    <rect x="40" y="0"  width="20" height="20" fill="#000"/>
    <rect x="60" y="0"  width="20" height="20" fill="#fff"/>
    <rect x="0"  y="20" width="20" height="20" fill="#fff"/>
    <rect x="20" y="20" width="20" height="20" fill="#000"/>
    <rect x="40" y="20" width="20" height="20" fill="#fff"/>
    <rect x="60" y="20" width="20" height="20" fill="#000"/>
    <rect x="0"  y="40" width="20" height="20" fill="#000"/>
    <rect x="20" y="40" width="20" height="20" fill="#fff"/>
    <rect x="40" y="40" width="20" height="20" fill="#000"/>
    <rect x="60" y="40" width="20" height="20" fill="#fff"/>
  </g>

  <!-- Car left (SVG car shape) -->
  <g transform="translate(60, 530) scale(2.8)" opacity="0.22">
    <rect x="0" y="18" width="88" height="28" rx="6" fill="#CC1111"/>
    <rect x="12" y="6"  width="58" height="22" rx="5" fill="#CC1111"/>
    <rect x="15" y="8"  width="24" height="16" rx="2" fill="#88ccff" opacity="0.7"/>
    <rect x="42" y="8"  width="24" height="16" rx="2" fill="#88ccff" opacity="0.7"/>
    <circle cx="18" cy="48" r="10" fill="#222"/>
    <circle cx="70" cy="48" r="10" fill="#222"/>
    <circle cx="18" cy="48" r="5"  fill="#555"/>
    <circle cx="70" cy="48" r="5"  fill="#555"/>
  </g>

  <!-- Car right (mirrored, blue) -->
  <g transform="translate(1220, 530) scale(-2.8, 2.8)" opacity="0.22">
    <rect x="0" y="18" width="88" height="28" rx="6" fill="#1155CC"/>
    <rect x="12" y="6"  width="58" height="22" rx="5" fill="#1155CC"/>
    <rect x="15" y="8"  width="24" height="16" rx="2" fill="#88ccff" opacity="0.7"/>
    <rect x="42" y="8"  width="24" height="16" rx="2" fill="#88ccff" opacity="0.7"/>
    <circle cx="18" cy="48" r="10" fill="#222"/>
    <circle cx="70" cy="48" r="10" fill="#222"/>
    <circle cx="18" cy="48" r="5"  fill="#555"/>
    <circle cx="70" cy="48" r="5"  fill="#555"/>
  </g>

  <!-- Main title -->
  <text x="640" y="318"
        font-family="Arial Black, Arial, sans-serif"
        font-size="100"
        font-weight="900"
        text-anchor="middle"
        fill="url(#titleGrad)">Rev &amp; Learn</text>

  <!-- Subtitle -->
  <text x="640" y="374"
        font-family="Arial, sans-serif"
        font-size="24"
        font-weight="bold"
        text-anchor="middle"
        fill="#cccccc"
        letter-spacing="6">RACE. ANSWER. UPGRADE.</text>

  <!-- Loading text -->
  <text x="640" y="658"
        font-family="Arial, sans-serif"
        font-size="14"
        text-anchor="middle"
        fill="#555555"
        letter-spacing="3">Loading...</text>
</svg>
