name: Deploy Web Game

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Export game using pre-built Godot Docker image ─────────────────
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          cp -r /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null || true

      - name: Export HTML5 build
        run: |
          mkdir -p build/web
          cd godot_project
          godot --headless --export-release "Web" ../build/web/index.html

      - name: Copy question packs into build
        run: cp -r question_packs build/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/
          retention-days: 1

  # ── Job 2: Deploy to Hetzner (standard Ubuntu, no container quirks) ───────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 135.181.205.124 >> ~/.ssh/known_hosts

      - name: Sync web build to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            build/web/ admin@135.181.205.124:/home/admin/apps/rev-and-learn/web/html/
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            build/question_packs/ admin@135.181.205.124:/home/admin/apps/rev-and-learn/question_packs/

      - name: Restart containers on server
        run: |
          ssh -i ~/.ssh/deploy_key admin@135.181.205.124 \
            "cd /home/admin/apps/rev-and-learn && docker compose up -d"
