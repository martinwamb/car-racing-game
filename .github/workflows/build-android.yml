name: Build Android AAB

on:
  push:
    tags:
      - 'v*'       # e.g. v1.0.0, v0.2.0
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3   # same image used by the web build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          cp -r /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null || true

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d \
            > godot_project/rev-and-learn.keystore

      - name: Inject keystore password into export_presets.cfg
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          sed -i \
            "s|sign/release_keystore_password=\"\"|sign/release_keystore_password=\"${KEYSTORE_PASS}\"|" \
            godot_project/export_presets.cfg

      - name: Build Android AAB
        run: |
          mkdir -p build/android
          cd godot_project
          godot --headless --export-release "Android" ../build/android/rev-and-learn.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rev-and-learn-${{ github.ref_name }}.aab
          path: build/android/rev-and-learn.aab
          retention-days: 30
